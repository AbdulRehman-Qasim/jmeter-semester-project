name: JMeter Performance Tests

on:
  push:
    branches: [ master ]

jobs:
  performance-test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 11 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download Apache JMeter 5.6.3
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter
          chmod -R +x jmeter/bin || true

      - name: Run Performance Tests and Generate Report
        run: |
          rm -rf reports || true
          mkdir -p results reports
          jmeter/bin/jmeter -n \
            -t tests/load_test.jmx \
            -l results/results.jtl \
            -e -o reports

      - name: Upload HTML Report as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report
          path: reports