name: JMeter Performance Tests

on:
  push:
    branches:
      - main
      - master

jobs:
  performance-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Verify Java installation
        run: java -version

      - name: Download Apache JMeter 5.6.3
        run: |
          curl -fsSL -o apache-jmeter-5.6.3.tgz https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter
          chmod -R +x jmeter/bin || true

      - name: Verify JMeter installation
        run: jmeter/bin/jmeter --version

      - name: Run Performance Tests
        env:
          JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
        run: |
          mkdir -p results
          jmeter/bin/jmeter -n \
            -t tests/load_test.jmx \
            -l results/results.jtl

      - name: Upload JTL Results as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-results
          path: results/results.jtl
          if-no-files-found: warn